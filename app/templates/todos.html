{% extends "base.html" %}

{% block subpage_content %}

<div class="container-fluid">
    <h3 class="mb-4">My Todos</h3>

    <form method="post" action="/todos" class="mb-4">
    <div class="input-group">
        <input type="text" name="title" class="form-control" placeholder="New todo..." required>
        <button class="btn btn-primary">Add</button>
    </div>
    </form>

    {% if todos %}
        <div class="row g-3">
            {% for todo in todos %}
                <div class="col-md-4">
                    <div class="card shadow-sm p-3">
                        <div class="d-flex justify-content-between align-items-center">
                            <h5 class="mb-0">{{ todo.title }}</h5>
                            
                            {% if todo.completed %}
                                <span class="badge bg-success">Done</span>
                            {% else %}
                                <span class="badge bg-warning text-dark">Pending</span>
                            {% endif %}
                        </div>
                    </div>
                </div>
            {% endfor %}
        </div>
    {% else %}
        <div class="alert alert-info">
            No todos found. Add some!
        </div>
    {% endif %}
</div>

{% endblock %}
